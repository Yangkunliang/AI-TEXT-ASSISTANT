<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Inter", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }
    
    body {
      width: 400px;
      height: 600px;
      padding: 0;
      font-size: 14px;
      background: #f6f5f8;
      margin: 0;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .container {
      width: 100%;
      height: 100%;
      background: white;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .title {
      font-size: 16px;
      font-weight: 600;
      color: #2e0bda;
      margin-bottom: 10px;
    }
    
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #f1f5f9;
      flex-shrink: 0;
    }
    
    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .logo-container {
      padding: 6px;
      background: #2e0bda;
      border-radius: 8px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    
    .logo {
      width: 16px;
      height: 16px;
      color: white;
    }
    
    .header-right {
      display: flex;
      gap: 4px;
    }
    
    .header-btn {
      padding: 8px;
      border-radius: 8px;
      background: transparent;
      border: none;
      cursor: pointer;
      color: #64748b;
      transition: all 0.2s;
    }
    
    .header-btn:hover {
      background: #f1f5f9;
    }
    
    main {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      gap: 16px;
      display: flex;
      flex-direction: column;
    }
    
    textarea {
      width: 100%;
      min-height: 120px;
      padding: 12px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      background: #f8fafc;
      resize: none;
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }
    
    textarea:focus {
      border-color: #2d8cf0;
      box-shadow: 0 0 0 3px rgba(45, 140, 240, 0.15);
    }
    
    .btn-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    
    .action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px;
      border-radius: 12px;
      background: white;
      border: 1px solid #e2e8f0;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .action-btn:hover {
      border-color: rgba(46, 11, 218, 0.4);
      background: rgba(46, 11, 218, 0.05);
    }
    
    .action-icon {
      color: #2e0bda;
      margin-bottom: 4px;
      opacity: 0.7;
    }
    
    .action-label {
      font-size: 12px;
      font-weight: 500;
      color: #334155;
    }
    
    .utility-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .section-title {
      font-size: 10px;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding-left: 4px;
    }
    
    .utility-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    
    .utility-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 12px;
      background: #f8fafc;
      color: #334155;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .utility-btn:hover {
      background: #e2e8f0;
    }
    
    .utility-icon {
      width: 16px;
      height: 16px;
      opacity: 0.7;
    }
    
    .utility-label {
      font-size: 12px;
      font-weight: 500;
    }
    
    .results-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 4px;
    }
    
    .results-title {
      font-size: 10px;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .results-actions {
      display: flex;
      gap: 12px;
    }
    
    .action-link {
      font-size: 10px;
      font-weight: 700;
      color: #2e0bda;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all 0.2s;
    }
    
    .action-link:hover {
      opacity: 0.8;
    }
    
    .action-link.disabled {
      color: #cbd5e1;
      cursor: not-allowed;
    }
    
    .results-content {
      padding: 12px;
      border-radius: 12px;
      min-height: 100px;
      background: rgba(46, 11, 218, 0.05);
      border: 1px solid rgba(46, 11, 218, 0.1);
      transition: all 0.3s;
    }
    
    .processing-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100px;
      padding: 16px;
      color: #94a3b8;
      gap: 8px;
    }
    
    .spinner {
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .result-text {
      font-size: 13px;
      line-height: 1.5;
      color: #334155;
      white-space: pre-wrap;
    }
    
    .result-content {
      font-size: 13px;
      line-height: 1.5;
      color: #334155;
      white-space: pre-wrap;
    }
    
    .placeholder-text {
      font-size: 13px;
      line-height: 1.5;
      color: #94a3b8;
      font-style: italic;
    }
    
    footer {
      padding: 16px;
      background: #f8fafc;
      border-top: 1px solid #f1f5f9;
      flex-shrink: 0;
    }
    
    .footer-content {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    
    .qr-container {
      width: 64px;
      height: 64px;
      background: white;
      padding: 4px;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      flex-shrink: 0;
      overflow: hidden;
    }
    
    .qr-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    
    .qr-info {
      flex: 1;
    }
    
    .qr-title {
      font-size: 11px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 4px;
      line-height: 1.2;
    }
    
    .qr-desc {
      font-size: 10px;
      color: #64748b;
      line-height: 1.3;
      margin-bottom: 8px;
    }
    
    .api-tags {
      display: flex;
      gap: 8px;
    }
    
    .api-tag {
      display: inline-flex;
      align-items: center;
      padding: 4px 6px;
      border-radius: 4px;
      font-size: 8px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .api-tag.deepseek {
      background: rgba(46, 11, 218, 0.1);
      color: #2e0bda;
      border: 1px solid rgba(46, 11, 218, 0.2);
    }
    
    .api-tag.openai {
      background: rgba(16, 185, 129, 0.1);
      color: #059669;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }
    
    /* Lucide Icons */
    .icon {
      display: inline-block;
      width: 1em;
      height: 1em;
      stroke-width: 1.5;
      stroke: currentColor;
      fill: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <div class="logo-container">
          <svg class="logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 12H19M12 5V19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h1 class="title">AI 文本助手</h1>
      </div>
      <div class="header-right">
        <button class="header-btn" id="historyBtn" title="历史记录">
          <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
        </button>
        <button class="header-btn" id="openSettings" title="设置">
          <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6m11-7h-6m-6 0H1"/>
          </svg>
        </button>
      </div>
    </header>
    
    <main>
      <div class="input-area">
        <textarea id="inputText" placeholder="输入文字，或点击下方工具开始处理网页内容..."></textarea>
      </div>
      
      <div class="btn-grid">
        <button class="action-btn" id="summaryPage">
          <svg class="action-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="20" height="20">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <polyline points="14 2 14 8 20 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="16" y1="13" x2="8" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="16" y1="17" x2="8" y2="17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <polyline points="10 9 9 9 8 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="action-label">网页总结</span>
        </button>
        <button class="action-btn" id="polish">
          <svg class="action-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="20" height="20">
            <path d="M12 19l7-7 3 3-7 7-3-3z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 2l7.586 7.586" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="11" cy="11" r="2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="action-label">文案润色</span>
        </button>
        <button class="action-btn" id="translate">
          <svg class="action-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="20" height="20">
            <path d="M5 8l7 7 7-7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M5 16l7-7 7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="action-label">翻译成中文</span>
        </button>
      </div>
      
      <div class="utility-section">
        <h3 class="section-title">实用工具</h3>
        <div class="utility-grid">
          <button class="utility-btn" id="scrollScreenshot">
            <svg class="utility-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <line x1="3" y1="9" x2="21" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <line x1="9" y1="21" x2="9" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="utility-label">截图</span>
          </button>
          <button class="utility-btn" id="scrollCapture">
            <svg class="utility-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="utility-label">滚动截图</span>
          </button>
          <button class="utility-btn" id="summaryScreenshot">
            <svg class="utility-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M3 9h18M9 21V9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="utility-label">总结页面</span>
          </button>
          <button class="utility-btn" id="generateQRCode">
            <svg class="utility-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="3" y="3" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <rect x="15" y="3" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <rect x="15" y="15" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M21 15v3a2 2 0 0 1-2 2H8l-4 1v-9a2 2 0 0 1 2-2h2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="utility-label">生成二维码</span>
          </button>
        </div>
      </div>
      
      <div class="results-section">
        <div class="results-header">
          <h3 class="results-title">处理结果</h3>
          <div class="results-actions">
            <a href="#" class="action-link" id="copyResult">
              <svg class="icon" width="12" height="12" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              复制结果
            </a>
            <a href="#" class="action-link" id="clearAll">
              <svg class="icon" width="12" height="12" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              清空
            </a>
          </div>
        </div>
        
        <div class="results-content">
          <div id="result" class="result-content">
            等待输入或点击上方工具开始处理网页内容...
          </div>
        </div>
      </div>
    </main>
    
    <footer>
      <div class="footer-content">
        <div class="qr-container">
          <img id="wechatQrCode" class="qr-image" src="icons/contacts.jpg" alt="微信二维码">
        </div>
        <div class="qr-info">
          <p class="qr-title">扫码加我提建议</p>
          <p class="qr-desc">支持 DeepSeek 和 OpenAI 接口</p>
          <div class="api-tags">
            <span class="api-tag deepseek">DeepSeek</span>
            <span class="api-tag openai">OpenAI</span>
          </div>
        </div>
      </div>
    </footer>
  </div>
  
  <script src="html2canvas.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
