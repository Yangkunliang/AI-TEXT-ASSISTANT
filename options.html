<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>API Key 设置</title>
  <style>
    body{width:360px;margin:40px auto;font-size:14px;line-height:1.6}
    .box{padding:20px;border:1px solid #eee;border-radius:10px}
    input{width:100%;padding:10px;margin:10px 0;border:1px solid #ddd;border-radius:6px}
    button{padding:10px 16px;background:#2d8cf0;color:white;border:none;border-radius:6px;cursor:pointer}
    .tip{font-size:12px;color:#888;margin-top:6px}
    #status{margin-top:10px;color:green}
  </style>
</head>
<body>
  <div class="box">
    <h3>设置 API Key</h3>
    <input id="apiKey" placeholder="请输入 DeepSeek API Key">
    <button id="save">保存</button>
    <div id="status"></div>
    <div class="tip">Key 只会保存在本地，不会上传到任何服务器</div>
  </div>
  <!-- 引入外部JS文件，而不是内联 -->
  <script src="options.js"></script>
</body>
</html>
